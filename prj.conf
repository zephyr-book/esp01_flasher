# ESP-01 USB <-> uart1 flashing bridge.
#
# Build (no shield, no Wi-Fi -- uart1 must stay a plain UART):
#   west build -p always -b zbook/rp2350b/m33
# Then flash the RP2350 over SWD as usual (just flash / west flash).

# --- USB device stack (device_next) + CDC ACM serial class ---
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n

# --- Serial: interrupt-driven bridge on both ports, host line-coding readback,
#     and runtime reconfigure so uart1 can follow the host baud (esptool). ---
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_USE_RUNTIME_CONFIGURE=y

# --- ESP power/reset control lines ---
CONFIG_GPIO=y

# --- Plumbing ---
CONFIG_RING_BUFFER=y
CONFIG_HWINFO=y

# Diagnostics on the console (uart0); the flasher has no interactive shell.
CONFIG_LOG=y
CONFIG_USBD_LOG_LEVEL_ERR=y
CONFIG_UDC_DRIVER_LOG_LEVEL_ERR=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y

CONFIG_ASSERT=y
CONFIG_MAIN_STACK_SIZE=2048
